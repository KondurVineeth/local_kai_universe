appId: com.ziroh.universe
productName: Universe
copyright: Copyright © 2026 Ziroh Labs Private Limited
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
asar: true
afterPack: build/after-pack.cjs

# ── macOS ────────────────────────────────────────────────────────────────────
# Ad-hoc signed via the `build/after-pack.cjs` hook (`codesign --sign -`).
# electron-builder's own signing is disabled (`identity: null`) because v25
# reads `identity: '-'` as a keychain identity NAME, fails the lookup, and
# skips signing entirely — leaving the bundle unsigned. A quarantined
# unsigned bundle triggers the unrecoverable "X is damaged and can't be
# opened" error on macOS 13+. The afterPack deep ad-hoc sign downgrades that
# to the recoverable "unidentified developer" dialog (right-click → Open)
# without needing a paid Apple Developer account. Proper signing +
# notarization is the long-term fix; needs a paid Apple Developer Program
# membership and a Developer ID Application cert.
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: build/icon.png
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
dmg:
  title: ${productName}-${version}
  iconSize: 100
  # Explicit arch in the filename — the electron-builder default drops it for
  # the x64 build, producing an ambiguous `Universe-1.0.0.dmg`.
  artifactName: ${productName}-${version}-${arch}.${ext}

# ── Windows ──────────────────────────────────────────────────────────────────
# NSIS installer + portable exe. Unsigned — SmartScreen will throw a warning
# on first run. Building from macOS works for both formats without Wine.
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  shortcutName: Universe
  artifactName: ${productName}-${version}-Setup-${arch}.${ext}
portable:
  artifactName: ${productName}-${version}-Portable-${arch}.${ext}

# ── Linux ────────────────────────────────────────────────────────────────────
# AppImage (universal, runs on any modern distro) and Debian package. Both
# build cleanly from macOS.
linux:
  category: Development
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  synopsis: Universe — desktop chat client for local language models
  maintainer: Abhishek Sharma <abhisheksharma@yellowchalk.com>
  icon: build/icon.png
appImage:
  artifactName: ${productName}-${version}-${arch}.${ext}
